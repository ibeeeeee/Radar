<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07090F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Affiliate Radar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #07090F; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    body { -webkit-text-size-adjust: 100%; }
    textarea { resize: none; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: #07090F; z-index: 9999; pointer-events: none;
    }
    .spin {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid #1C2840; border-top-color: #00E5A0;
      animation: ld 0.85s linear infinite;
    }
    @keyframes ld { to { transform: rotate(360deg); } }
    #err {
      display: none; position: fixed; inset: 0; background: #07090F;
      color: #FF3B5C; padding: 24px 20px; font-family: system-ui;
      font-size: 13px; line-height: 1.5; overflow: auto; z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spin"></div>
    <div style="color:#6B82A8;font-family:system-ui;font-size:12px;letter-spacing:0.08em;font-weight:700">
      AFFILIATE RADAR
    </div>
  </div>
  <div id="err"></div>
  <div id="root"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById("loading").style.display = "none";
      var e = document.getElementById("err");
      e.style.display = "block";
      e.textContent = "Error: " + msg + (err ? "\n\n" + err.stack : "");
    };
  </script>
